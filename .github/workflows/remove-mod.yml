name: Remove mod

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Mod slug to remove (matches the .pw.toml filename in mods/)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  remove-mod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Remove mod
        run: |
          slug='${{ inputs.slug }}'

          if ! ls "mods/${slug}.pw.toml" >/dev/null 2>&1; then
            echo "ERROR: mods/${slug}.pw.toml does not exist"
            echo "Available mods:"
            ls mods/*.pw.toml 2>/dev/null || echo "  (none)"
            exit 1
          fi

          packwiz remove "$slug"
          packwiz refresh

      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add mods/ index.toml
          if git diff --cached --quiet; then
            echo "No changes — nothing was removed"
            exit 0
          fi
          git commit -m "Remove ${{ inputs.slug }}

          Triggered by ${{ github.actor }} via Remove mod workflow."
          git push

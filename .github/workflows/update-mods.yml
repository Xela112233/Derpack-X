name: Update mods

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Mod slug to update (leave blank to update ALL mods)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  update-mods:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Update
        id: update
        run: |
          slug='${{ inputs.slug }}'
          if [[ -z "$slug" ]]; then
            echo "==> packwiz update --all"
            packwiz update --all --yes 2>&1 | tee /tmp/update.log
            echo "scope=all mods" >> "$GITHUB_OUTPUT"
          else
            if ! ls "mods/${slug}.pw.toml" >/dev/null 2>&1; then
              echo "ERROR: mods/${slug}.pw.toml does not exist"
              exit 1
            fi
            echo "==> packwiz update $slug"
            packwiz update "$slug" --yes 2>&1 | tee /tmp/update.log
            echo "scope=${slug}" >> "$GITHUB_OUTPUT"
          fi
          packwiz refresh

      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add mods/ index.toml
          if git diff --cached --quiet; then
            echo "Nothing to update — all mods already at latest"
            exit 0
          fi
          git commit -m "Update mods (${{ steps.update.outputs.scope }})

          Triggered by ${{ github.actor }} via Update mods workflow."
          git push

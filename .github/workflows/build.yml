name: Build modpack

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out main rather than the tagged commit, so the version-bump
          # commit goes on top of main rather than rolling it back.
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java (for packwiz-installer-bootstrap)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up packwiz
        uses: ./.github/actions/setup-packwiz

      # When triggered by a release, force pack.toml's version to match the tag.
      # Tag v0.2.0 -> pack.toml version "0.2.0". Skipped on workflow_dispatch.
      - name: Sync pack.toml version with release tag
        if: github.event_name == 'release'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          # Strip leading 'v' from tag (v0.2.0 -> 0.2.0)
          tag="${{ github.event.release.tag_name }}"
          target_version="${tag#v}"

          current_version=$(grep -E '^version\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')

          if [[ "$current_version" == "$target_version" ]]; then
              echo "==> pack.toml already at version $target_version, nothing to sync"
              exit 0
          fi

          echo "==> Bumping pack.toml: $current_version -> $target_version"
          sed -i -E "s/^version\s*=\s*\".*\"/version = \"${target_version}\"/" pack.toml

          # Verify the edit took
          new_version=$(grep -E '^version\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$new_version" != "$target_version" ]]; then
              echo "ERROR: sed didn't update pack.toml correctly (got '$new_version', wanted '$target_version')"
              exit 1
          fi

          # Refresh so index hash matches new pack.toml
          packwiz refresh

          git add pack.toml index.toml
          git commit -m "Bump version to ${target_version} for release ${tag}"
          # Push directly to the branch the tag is on. This means main, in our case.
          git push origin HEAD:main

      - name: Refresh packwiz index
        run: packwiz refresh --build

      - name: Read pack metadata
        id: meta
        run: |
          version=$(grep -E '^version\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          name=$(grep -E '^name\s*=' pack.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          slug=$(echo "$name" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      # 1. .mrpack â€” small, references mods by URL
      - name: Build .mrpack
        run: |
          mkdir -p dist
          packwiz mr export -o "dist/${{ steps.meta.outputs.slug }}-${{ steps.meta.outputs.version }}.mrpack"

      # 2. Prism (bundled jars) â€” fat zip, friend imports and plays
      - name: Build Prism instance (bundled)
        run: bash scripts/build-prism-bundled.sh

      # 3. Prism (installer) â€” thin zip, fetches mods on launch
      - name: Build Prism instance (installer)
        env:
          # Points at main branch's pack.toml so the version bump (above) is included.
          # Trade-off: installer-variant users will get any post-release changes to main.
          # That's fine for our cadence; if you want pinned-to-tag behavior, change 'main'
          # to ${{ github.event.release.tag_name }} but also force-push the tag forward
          # in the version-sync step.
          PACK_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/pack.toml
        run: bash scripts/build-prism-installer.sh

      # 4. Server pack â€” configs + fetch-mods.sh + run.sh
      - name: Build server pack
        run: bash scripts/build-server.sh

      - name: Clean staging from dist
        run: rm -rf dist/staging

      - name: List artifacts
        run: ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.slug }}-${{ steps.meta.outputs.version }}
          path: dist/

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.mrpack
            dist/*.zip
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true

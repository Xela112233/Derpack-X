name: Set up packwiz
description: Install Go and packwiz, with caching so subsequent runs are fast.

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: false  # we manage our own cache below

    # Cache the compiled packwiz binary keyed by Go version.
    # Hit = ~1 second restore. Miss = ~30s install (rare).
    - name: Cache packwiz binary
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/go/bin/packwiz
        key: packwiz-${{ runner.os }}-go1.22-v1

    - name: Install packwiz (cache miss only)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: go install github.com/packwiz/packwiz@latest

    - name: Add packwiz to PATH
      shell: bash
      run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

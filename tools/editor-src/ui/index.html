<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Derpack Editor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div class="pack-info">
      <span id="pack-name">Loading...</span>
      <span class="separator">·</span>
      <span id="pack-version">—</span>
      <span class="separator">·</span>
      <span id="mod-count">0 mods</span>
    </div>
    <div class="topbar-actions">
      <button id="refresh-btn" type="button" title="Reload mod list from disk">↻ Refresh</button>
    </div>
  </header>

  <main>
    <section class="action-bar">
      <button id="add-mod-btn" type="button" class="primary">+ Add mod</button>
      <input type="search" id="search" placeholder="Filter mods..." />
    </section>

    <section class="mod-list-wrapper">
      <table class="mod-list">
        <thead>
          <tr>
            <th>Slug</th>
            <th>Name</th>
            <th>Side</th>
            <th>Source</th>
            <th class="col-pinned">Pinned</th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="mod-list-body">
          <tr><td colspan="6" class="empty">Loading mods...</td></tr>
        </tbody>
      </table>
    </section>

    <section id="status-pane" class="status-pane">
      <h3>Recent operations</h3>
      <ul id="status-log"></ul>
    </section>
  </main>

  <!-- Add mod modal -->
  <div id="add-modal" class="modal hidden" role="dialog" aria-labelledby="add-modal-title">
    <div class="modal-content">
      <h2 id="add-modal-title">Add mod</h2>
      <label>
        Source
        <select id="add-source">
          <option value="mr">Modrinth</option>
          <option value="cf">CurseForge</option>
        </select>
      </label>
      <label>
        Slug
        <input type="text" id="add-slug" placeholder="e.g. supplementaries" />
      </label>
      <label>
        Side
        <select id="add-side">
          <option value="both">Both (client + server)</option>
          <option value="client">Client only</option>
          <option value="server">Server only</option>
        </select>
      </label>
      <div class="modal-actions">
        <button type="button" id="add-cancel">Cancel</button>
        <button type="button" id="add-confirm" class="primary">Add</button>
      </div>
    </div>
  </div>

  <!-- Confirm modal (used for remove and unpin) -->
  <div id="confirm-modal" class="modal hidden" role="dialog">
    <div class="modal-content">
      <h2 id="confirm-title">Confirm</h2>
      <p id="confirm-message">Are you sure?</p>
      <div class="modal-actions">
        <button type="button" id="confirm-cancel">Cancel</button>
        <button type="button" id="confirm-ok" class="danger">Confirm</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
